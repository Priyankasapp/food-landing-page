<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Foodeat</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
</head>
<body>
   <div class="register-section d-flex align-items-center justify-content-center min-vh-100">

  <div class="register-card p-4 p-md-5 shadow-lg">

    <h2 class="text-center mb-4">Create Account</h2>

    <form>

      <div class="mb-3">
        <label class="form-label">Full Name</label>
        <input type="text" class="form-control" placeholder="Enter your name">
      </div>

      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" class="form-control" placeholder="Enter your email">
      </div>

      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" placeholder="Create password">
      </div>

      <div class="mb-3">
        <label class="form-label">Confirm Password</label>
        <input type="password" class="form-control" placeholder="Confirm password">
      </div>

      <button type="submit" class="btn btn-food w-100">
        Register
      </button>

      <p class="text-center mt-3">
        Already have an account?
        <a href="login.html">Login</a>
      </p>

    </form>

  </div>

</div> 
</body>
</html>
